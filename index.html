<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive 3D Showcase</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0f172a; /* Sleek dark slate */
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Background Glows */
    .glow-1 {
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.4), transparent 70%);
      filter: blur(80px);
      z-index: 0;
    }
    .glow-2 {
      position: absolute;
      bottom: -150px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.3), transparent 70%);
      filter: blur(100px);
      z-index: 0;
    }

    /* Navbar */
    header {
      width: 100%;
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Main Content container */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 4rem;
      z-index: 10;
      gap: 4rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* Text Section */
    .text-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .badge {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.875rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }
    h1 {
      font-size: 4rem;
      line-height: 1.1;
      font-weight: 700;
    }
    h1 span {
      background: linear-gradient(90deg, #c084fc, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 1.125rem;
      color: #94a3b8;
      line-height: 1.6;
      max-width: 500px;
    }
    
    .cta-btn {
      align-self: flex-start;
      margin-top: 1rem;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 1.125rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      font-family: 'Outfit', sans-serif;
    }
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
    }

    /* 3D Model Section */
    .model-container {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 600px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      font-size: 0.875rem;
      pointer-events: none;
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
    }

    @media (max-width: 968px) {
      main {
        flex-direction: column;
        padding: 2rem;
        gap: 3rem;
      }
      header {
        padding: 1.5rem 2rem;
      }
      h1 {
        font-size: 3rem;
      }
      .model-container {
        height: 400px;
      }
    }
  </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <header>
    <div class="logo">Vision3D</div>
  </header>

  <main>
    <div class="text-section">
      <div class="badge">Next-Gen Web Experience</div>
      <h1>Explore Our <br><span>Interactive Robot</span></h1>
      <p>Immerse yourself in high-fidelity 3D rendering right in your browser. Drag to rotate, scroll to zoom, and experience seamless web integration.</p>
      <button class="cta-btn" onclick="document.getElementById('robot').cameraOrbit='0deg 75deg 105%'">Reset View</button>
    </div>

    <div class="model-container">
      <model-viewer
        id="robot"
        src="model1.glb"
        alt="Robot Mascot"
        camera-controls
        auto-rotate
        rotation-per-second="30deg"
        shadow-intensity="1"
        shadow-softness="1"
        environment-image="legacy"
        exposure="1"
        style="background-color: transparent;">
      </model-viewer>
      <div class="hint">Interact with the model</div>
    </div>
  </main>

  <script>
    const viewer = document.getElementById('robot');
    viewer.addEventListener('load', () => {
      viewer.model.materials.forEach(mat => {
        // Keeping it natural with some roughness but letting the environment map provide highlights
        if (mat.pbrMetallicRoughness) {
          mat.pbrMetallicRoughness.setMetallicFactor(0.2);
          mat.pbrMetallicRoughness.setRoughnessFactor(0.8);
        }
      });
    });
  </script>
</body>
</html>
